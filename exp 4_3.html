
<!DOCTYPE html>
<html>
<head>
    <title>Embedding JavaScript</title>
</head>
<body>

<h2>JavaScript Embedded in HTML</h2>

<p id="demo">This text will be changed by JavaScript.</p>

<script>
    // JavaScript embedded inside HTML
    document.getElementById("demo").innerHTML = "Hello! JavaScript is working.";
</script>

</body>
</html>
