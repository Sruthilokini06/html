
<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Concepts Demo</title>
</head>
<body>

<h2>Check the Console Output (F12)</h2>

<script>

    var x = 10;        
    let y = 20;       
    const z = 30;      

    console.log("var x:", x);
    console.log("let y:", y);
    console.log("const z:", z);

    if (true) {
        var a = 100;   
        let b = 200;   
        const c = 300; 
    }

    console.log("var a outside block:", a);
    let name = "John";
    let age = 25;
    let message = `My name is ${name} and I am ${age} years old.`;
    console.log(message);
    function greet() {
        console.log("Hello from Function Declaration");
    }

    greet();

    const sayHi = function() {
        console.log("Hello from Function Expression");
    };

    sayHi();


    function welcome(user = "Guest") {
        console.log("Welcome " + user);
    }

    welcome();        
    welcome("Alice"); 

    const add = (a, b) => a + b;
    console.log("Sum:", add(5, 3));

    const hello = () => "Hello World!";
    console.log(hello());

</script>

</body>
</html>
